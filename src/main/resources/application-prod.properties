# ===========================================
# Perfil PROD
# Todas as variáveis devem vir do ambiente. NÃO fornecer defaults.
# ===========================================
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Schema controlado pelo Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# JWT — obrigatório vir do ambiente, sem default
jwt.secret=${JWT_SECRET}

# Actuator restrito
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Logs mais sóbrios em produção
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
