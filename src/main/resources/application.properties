spring.application.name=estoqueIA

# ===========================================
# PostgreSQL
# Dev: default 123456 (basta ter o Postgres local com essa senha).
# Para sobrescrever: $env:DB_PASSWORD="suaSenha" (ou aplique em prod via env).
# ===========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME:estoqueia}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===========================================
# JPA / Hibernate
# ===========================================
# Flyway controla o schema. Hibernate apenas valida que as @Entity batem com o DB.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===========================================
# Flyway
# ===========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ===========================================
# OpenAPI / Swagger
# ===========================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ===========================================
# Actuator
# ===========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=estoqueIA
info.app.description=Sistema de gestão de estoque com IA preditiva
info.app.version=@project.version@

# ===========================================
# Servidor
# ===========================================
server.port=8080

# ===========================================
# JWT
# Chave HMAC-SHA256: mínimo 32 caracteres (256 bits).
# Defina JWT_SECRET no ambiente. Ex (PowerShell):
#   $env:JWT_SECRET="uma-chave-bem-longa-e-aleatoria-com-32-mais-chars"
# O default abaixo é APENAS para dev — troque em produção.
# ===========================================
jwt.secret=${JWT_SECRET:troque-essa-chave-em-producao-min-32-chars-aleatorios}
jwt.expiration-seconds=3600
jwt.refresh-expiration-seconds=2592000

# ===========================================
# IA (DeepSeek) — assistente de reposição
# API compatível com o formato da OpenAI.
# Defina a key no ambiente (NUNCA commitar). Ex (PowerShell):
#   $env:DEEPSEEK_API_KEY="sk-xxxxxxxx"
# Sem a key, o endpoint /ia/assistente responde 422 com aviso.
# ===========================================
deepseek.base-url=https://api.deepseek.com
deepseek.api-key=${DEEPSEEK_API_KEY:}
deepseek.model=deepseek-chat
